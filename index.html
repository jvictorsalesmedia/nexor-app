<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nexor | Gestão e Organização</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #030303;
      --surface: #0a0a0b;
      --surface-2: #141416;
      --text: #f7f7f3;
      --muted: #9d9d9a;
      --line: #2a2a2d;
      --accent: #ffffff;
      --accent-2: #bfc3c9;
      --gold: #d8b45f;
      --danger: #ff6b6b;
      --warning: #dda85a;
      --success: #72d49a;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.46);
      --page-base: #030303;
      --page-top: #000000;
      --page-bottom: #080808;
      --grid-line: rgba(255,255,255,0.025);
      --auth-base: #000000;
      --auth-card-bg: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.025));
      --glass-border: rgba(255,255,255,0.16);
      --sidebar-bg: color-mix(in srgb, #050505 88%, transparent);
      --logo-shadow: drop-shadow(0 0 26px rgba(255,255,255,0.14));
      --radius: 14px;
      --sidebar: 280px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    [data-theme="dark"] {
      color-scheme: dark;
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #f3f3f0;
      --surface: #ffffff;
      --surface-2: #ececea;
      --text: #0a0a0a;
      --muted: #676764;
      --line: #d8d8d2;
      --accent: #0a0a0a;
      --accent-2: #565b63;
      --gold: #a77b28;
      --danger: #b64242;
      --warning: #b97818;
      --success: #26835b;
      --shadow: 0 20px 55px rgba(10, 10, 10, 0.1);
      --page-base: #f3f3f0;
      --page-top: #ffffff;
      --page-bottom: #e8e8e3;
      --grid-line: rgba(0,0,0,0.035);
      --auth-base: #f3f3f0;
      --auth-card-bg: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(245,245,242,0.9));
      --glass-border: rgba(0,0,0,0.14);
      --sidebar-bg: color-mix(in srgb, #ffffff 88%, transparent);
      --logo-shadow: drop-shadow(0 0 18px rgba(0,0,0,0.16));
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, var(--page-top) 0%, var(--page-base) 48%, var(--page-bottom) 100%),
        repeating-linear-gradient(90deg, var(--grid-line) 0 1px, transparent 1px 96px),
        var(--bg);
      color: var(--text);
      font-family: var(--font);
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    .auth-view {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      background: #000;
    }

    .auth-card {
      width: min(440px, 100%);
      position: relative;
      overflow: hidden;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      padding: 28px clamp(18px, 4vw, 34px);
      backdrop-filter: none;
    }

    .auth-card::before {
      display: none;
    }

    .brand-mark {
      width: 50px;
      height: 50px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background: transparent;
      border: 0;
      box-shadow: none;
      overflow: hidden;
    }

    .brand-mark img {
      width: 76%;
      height: 76%;
      object-fit: contain;
      filter: var(--logo-shadow);
    }

    .auth-logo {
      display: block;
      width: min(400px, 92%);
      margin: 0 auto 34px;
      filter: var(--logo-shadow);
      animation: logoFloat 6s ease-in-out infinite, logoFocus 4.8s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-6px) scale(1.018); }
    }

    @keyframes logoFocus {
      0%, 100% { opacity: 0.92; }
      50% { opacity: 1; }
    }

    @keyframes panelSweep {
      0%, 62% { transform: translateX(-120%); opacity: 0; }
      72% { opacity: 0.72; }
      100% { transform: translateX(120%); opacity: 0; }
    }

    .auth-card h1,
    .module-title h1 {
      margin: 18px 0 8px;
      font-size: clamp(1.65rem, 3vw, 2.35rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .auth-card p,
    .module-title p,
    .muted {
      color: var(--muted);
    }

    .auth-view .auth-card p {
      margin: 0 0 22px;
      color: #a8a8a4;
    }

    .auth-view .field label {
      color: #b8b8b4;
    }

    .auth-view input {
      background: #050505;
      border-color: #2a2a2d;
      color: #ffffff;
    }

    .auth-view input:focus {
      border-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.12);
    }

    .auth-view .btn.primary {
      background: #ffffff;
      border-color: #ffffff;
      color: #050505;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-top: 14px;
    }

    .field label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      color: var(--text);
      border-radius: var(--radius);
      padding: 11px 12px;
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: color-mix(in srgb, var(--accent) 72%, var(--line));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 14%, transparent);
    }

    .btn {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 13px;
      color: var(--text);
      background: linear-gradient(180deg, color-mix(in srgb, var(--surface) 92%, white 4%), var(--surface));
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease, color 150ms ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 56%, var(--line));
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    }

    .btn.primary {
      background: var(--text);
      border-color: var(--text);
      color: var(--bg);
    }

    .btn.accent {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .btn.danger {
      border-color: color-mix(in srgb, var(--danger) 35%, var(--line));
      color: var(--danger);
    }

    .btn.icon {
      width: 40px;
      padding: 0;
    }

    .nex-ai-fab {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 55;
      width: 60px;
      height: 60px;
      padding: 0;
      border: 0;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 14px 34px rgba(0,0,0,0.5), 0 0 0 1px rgba(94,236,255,0.28), 0 0 26px rgba(94,236,255,0.24);
      animation: nexAiFabPulse 3.2s ease-in-out infinite;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .nex-ai-fab img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .nex-ai-fab:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 18px 40px rgba(0,0,0,0.55), 0 0 0 1px rgba(94,236,255,0.4), 0 0 34px rgba(94,236,255,0.38);
    }

    .nex-ai-fab.hidden {
      display: none;
    }

    @keyframes nexAiFabPulse {
      0%, 100% { box-shadow: 0 14px 34px rgba(0,0,0,0.5), 0 0 0 1px rgba(94,236,255,0.28), 0 0 26px rgba(94,236,255,0.24); }
      50% { box-shadow: 0 14px 34px rgba(0,0,0,0.5), 0 0 0 1px rgba(94,236,255,0.5), 0 0 40px rgba(94,236,255,0.5); }
    }

    @media (max-width: 620px) {
      .nex-ai-fab {
        left: 14px;
        bottom: 14px;
        width: 52px;
        height: 52px;
        border-radius: 15px;
      }
    }

    .auth-actions,
    .toolbar,
    .row-actions,
    .modal-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .auth-actions {
      margin-top: 18px;
    }

    .auth-error {
      min-height: 22px;
      margin-top: 12px;
      color: var(--danger);
      font-size: 0.9rem;
    }

    .save-notice {
      margin: 0 0 14px;
      padding: 10px 12px;
      border: 1px solid color-mix(in srgb, var(--success) 34%, var(--line));
      border-radius: 8px;
      color: var(--success);
      background: color-mix(in srgb, var(--success) 9%, transparent);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .save-notice.danger {
      border-color: color-mix(in srgb, var(--danger) 38%, var(--line));
      color: var(--danger);
      background: color-mix(in srgb, var(--danger) 10%, transparent);
    }

    .save-notice.neutral {
      border-color: color-mix(in srgb, var(--line) 76%, var(--text));
      color: var(--text);
      background: color-mix(in srgb, var(--panel) 90%, transparent);
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
    }

    .sidebar {
      position: relative;
      top: auto;
      height: auto;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: var(--sidebar-bg);
      backdrop-filter: blur(18px);
      padding: 18px;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .brand strong {
      display: block;
      font-size: 1.25rem;
      letter-spacing: 0;
    }

    .brand span {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .nav {
      display: grid;
      gap: 14px;
      margin: 18px 0;
    }

    .nav-group {
      display: grid;
      gap: 0;
    }

    .nav-group-toggle {
      width: 100%;
      border: 0;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 11px;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
    }

    .nav-group-toggle svg {
      width: 13px;
      height: 13px;
      stroke-width: 2.2;
      transition: transform 180ms ease;
    }

    .nav-group.open .nav-group-toggle svg {
      transform: rotate(180deg);
    }

    .nav-group-toggle:hover {
      color: var(--text);
    }

    .nav-group-items {
      display: none;
      flex-direction: column;
      gap: 1px;
      padding-bottom: 6px;
    }

    .nav-group.open .nav-group-items {
      display: flex;
      animation: softReveal 180ms ease both;
    }

    .nav button {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 8px 11px;
      border-radius: var(--radius);
      text-align: left;
      transition: background 150ms ease, color 150ms ease;
    }

    .nav button:hover,
    .nav button.active {
      color: var(--text);
      background: color-mix(in srgb, var(--accent) 8%, transparent);
    }

    .nav svg,
    .btn svg,
    .chip svg,
    .search-hit svg {
      width: 17px;
      height: 17px;
      stroke-width: 1.9;
      flex: 0 0 auto;
    }

    .sidebar-footer {
      margin-top: auto;
      display: grid;
      gap: 10px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .user-pill {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      color: var(--bg);
      background: linear-gradient(145deg, var(--text), var(--accent-2));
      font-weight: 800;
      text-transform: uppercase;
    }

    .user-pill strong,
    .user-pill span {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .user-pill span {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .content {
      min-width: 0;
      padding: 22px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 22px;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      padding-left: 42px;
    }

    .search-wrap .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-results {
      position: absolute;
      z-index: 20;
      left: 0;
      right: 0;
      top: calc(100% + 8px);
      max-height: 340px;
      overflow: auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 8px;
    }

    .search-hit {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      display: grid;
      grid-template-columns: 22px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: var(--radius);
    }

    .search-hit:hover {
      background: var(--surface-2);
    }

    .module-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 28px;
    }

    .module-title h1 {
      margin-top: 0;
    }

    .grid {
      display: grid;
      gap: 22px;
    }

    .grid.metrics {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .grid.two {
      grid-template-columns: minmax(0, 1.15fr) minmax(300px, 0.85fr);
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid.four {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .dashboard-row {
      margin-top: 28px;
    }

    .panel,
    .metric,
    .item-card,
    .kanban-column,
    .day-column,
    .quadrant,
    .table-wrap {
      background: linear-gradient(180deg, color-mix(in srgb, var(--surface) 94%, white 3%), color-mix(in srgb, var(--surface) 96%, transparent));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(14px);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .panel {
      padding: 24px;
    }

    .module-head,
    .panel,
    .metric,
    .item-card,
    .kanban-column,
    .day-column,
    .quadrant,
    .table-wrap,
    .mini-board {
      animation: softReveal 360ms ease both;
    }

    .panel:hover,
    .metric:hover,
    .item-card:hover,
    .mini-board:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent) 26%, var(--line));
    }

    @keyframes softReveal {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .toast-stack {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 60;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: min(360px, calc(100vw - 36px));
    }

    .toast {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 0.86rem;
      color: var(--text);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
      animation: softReveal 220ms ease both;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      border-left: 3px solid var(--accent);
    }

    .toast.leaving {
      animation: toastLeave 180ms ease both;
    }

    .toast.success { border-left-color: #3ecf8e; }
    .toast.error { border-left-color: #ef4444; }

    .donut-wrap {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .donut-chart {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      position: relative;
      flex: 0 0 auto;
    }

    .donut-hole {
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: var(--panel);
      display: grid;
      place-items: center;
      text-align: center;
      line-height: 1.1;
    }

    .donut-hole strong {
      font-size: 1.2rem;
    }

    .donut-hole span {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .donut-legend {
      display: grid;
      gap: 8px;
      flex: 1 1 160px;
      min-width: 140px;
    }

    .donut-legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.84rem;
    }

    .donut-legend-row strong {
      margin-left: auto;
    }

    .donut-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      flex: 0 0 auto;
    }

    .nex-ai-drawer {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: min(420px, 94vw);
      background: linear-gradient(180deg, color-mix(in srgb, var(--surface) 96%, white 2%), var(--surface));
      border-left: 1px solid var(--line);
      box-shadow: -24px 0 64px rgba(0,0,0,0.5);
      z-index: 60;
      display: flex;
      flex-direction: column;
      padding: 18px;
      gap: 12px;
      transform: translateX(100%);
      transition: transform 240ms ease;
    }

    .nex-ai-drawer.open {
      transform: translateX(0);
    }

    .nex-ai-drawer.hidden {
      display: none;
    }

    .nex-ai-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .nex-ai-head h2 {
      margin: 0;
      font-size: 1rem;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
    }

    .nex-ai-new {
      width: 100%;
      justify-content: center;
    }

    .nex-ai-conversation-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nex-ai-conversation-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 150ms ease;
    }

    .nex-ai-conversation-row:hover,
    .nex-ai-conversation-row.active {
      background: color-mix(in srgb, var(--accent) 7%, transparent);
    }

    .nex-ai-conversation-row strong {
      display: block;
      font-size: 0.88rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 260px;
    }

    .nex-ai-conversation-row .meta {
      font-size: 0.74rem;
      color: var(--muted);
    }

    .nex-ai-composer {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .nex-ai-composer textarea {
      flex: 1;
    }

    .nex-ai-script-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 360px;
      overflow-y: auto;
      margin-top: 6px;
    }

    .script-entry {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 16px;
      background: color-mix(in srgb, var(--accent) 4%, transparent);
    }

    .script-content {
      margin: 10px 0 0;
      white-space: pre-wrap;
      font-size: 0.86rem;
      line-height: 1.55;
      color: var(--text);
    }

    .nex-ai-thread {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      overflow-y: auto;
      padding: 4px 2px;
    }

    .nex-ai-empty {
      text-align: center;
      padding: 20px 10px;
      font-size: 0.86rem;
    }

    .nex-ai-msg {
      display: flex;
      animation: softReveal 220ms ease both;
    }

    .nex-ai-msg.user {
      justify-content: flex-end;
    }

    .nex-ai-msg.assistant {
      justify-content: flex-start;
    }

    .nex-ai-bubble {
      max-width: 82%;
      padding: 9px 12px;
      border-radius: var(--radius);
      font-size: 0.86rem;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .nex-ai-msg.user .nex-ai-bubble {
      background: var(--accent);
      color: var(--bg);
    }

    .nex-ai-msg.assistant .nex-ai-bubble {
      background: color-mix(in srgb, var(--accent) 7%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 18%, var(--line));
      color: var(--text);
    }

    @keyframes toastLeave {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(6px); }
    }

    .metric {
      padding: 22px;
      display: grid;
      gap: 12px;
      min-height: 128px;
      position: relative;
      overflow: hidden;
    }

    .metric::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.42), transparent);
    }

    .metric .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .metric strong {
      font-size: clamp(1.55rem, 2vw, 2.05rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .metric small {
      color: var(--muted);
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .section-title h2,
    .section-title h3 {
      margin: 0;
      font-size: 1rem;
    }

    .list {
      display: grid;
      gap: 9px;
    }

    .list-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .list-row:last-child {
      border-bottom: 0;
    }

    .list-row strong,
    .item-card strong {
      display: block;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 5px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface-2) 78%, transparent);
      color: var(--text);
      font-size: 0.76rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .chip.accent {
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border-color: color-mix(in srgb, var(--accent) 28%, var(--line));
    }

    .chip.gold {
      color: var(--gold);
      background: color-mix(in srgb, var(--gold) 12%, transparent);
      border-color: color-mix(in srgb, var(--gold) 30%, var(--line));
    }

    .chip.danger {
      color: var(--danger);
      background: color-mix(in srgb, var(--danger) 11%, transparent);
      border-color: color-mix(in srgb, var(--danger) 28%, var(--line));
    }

    .chip.success {
      color: var(--success);
      background: color-mix(in srgb, var(--success) 12%, transparent);
      border-color: color-mix(in srgb, var(--success) 28%, var(--line));
    }

    .progress {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--line);
    }

    .progress span {
      display: block;
      height: 100%;
      width: var(--value, 0%);
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: inherit;
    }

    .item-card {
      padding: 14px;
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .item-card.draggable {
      cursor: grab;
    }

    .item-card.draggable:active {
      cursor: grabbing;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .card-head strong {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .signup-photo {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      margin: 12px 0 6px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .quick-grid .btn {
      min-height: 54px;
      justify-content: flex-start;
    }

    .table-wrap {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th,
    td {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0;
      background: color-mix(in srgb, var(--surface-2) 62%, transparent);
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .kanban-board,
    .planner-board {
      display: grid;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 6px;
    }

    .kanban-board {
      grid-template-columns: repeat(7, minmax(240px, 1fr));
    }

    .planner-board {
      grid-template-columns: repeat(7, minmax(210px, 1fr));
    }

    .kanban-column,
    .day-column,
    .quadrant {
      padding: 12px;
      min-height: 420px;
    }

    .kanban-column.drag-over,
    .day-column.drag-over,
    .quadrant.drag-over {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 7%, var(--surface));
    }

    .column-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }

    .column-head h3 {
      margin: 0;
      font-size: 0.92rem;
    }

    .column-list {
      display: grid;
      gap: 10px;
      min-height: 320px;
      align-content: start;
    }

    .eisenhower-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .quadrant {
      min-height: 320px;
    }

    .quadrant h3 {
      margin: 0 0 4px;
    }

    .bar-chart {
      display: grid;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 130px minmax(0, 1fr) 72px;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .bar-track {
      height: 11px;
      border-radius: 999px;
      background: var(--surface-2);
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .bar-track span {
      display: block;
      height: 100%;
      width: var(--value);
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: inherit;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
    }

    .form-grid .wide {
      grid-column: 1 / -1;
    }

    dialog {
      width: min(760px, calc(100vw - 28px));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow);
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(10, 12, 10, 0.48);
      backdrop-filter: blur(5px);
    }

    .modal {
      padding: 18px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .modal-head h2 {
      margin: 0;
    }

    .modal-actions {
      margin-top: 16px;
      justify-content: flex-end;
    }

    .empty {
      display: grid;
      gap: 10px;
      place-items: center;
      min-height: 190px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 22px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.8fr) minmax(360px, 1.2fr);
      gap: 14px;
    }

    .notification-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
      display: inline-block;
      margin-left: -9px;
      margin-top: -14px;
      border: 2px solid var(--surface);
    }

    .check-only {
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      border-radius: 6px;
      border: 1px solid color-mix(in srgb, var(--accent) 42%, var(--line));
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 9%, transparent);
      font-size: 0.86rem;
      line-height: 1;
      font-weight: 800;
    }

    .check-action {
      font-size: 1rem;
      font-weight: 800;
      color: var(--accent);
    }

    .motion-card {
      position: relative;
      overflow: hidden;
    }

    .motion-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 20% 0%, color-mix(in srgb, var(--accent) 12%, transparent), transparent 34%);
      opacity: 0.42;
    }

    .minimal-chart {
      width: 100%;
      min-height: 150px;
      display: grid;
      align-items: end;
    }

    .minimal-chart svg {
      width: 100%;
      height: 150px;
      overflow: visible;
    }

    .minimal-chart .axis {
      stroke: color-mix(in srgb, var(--muted) 28%, transparent);
      stroke-dasharray: 2 5;
      stroke-width: 1;
    }

    .minimal-chart .line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2.2;
      vector-effect: non-scaling-stroke;
      filter: drop-shadow(0 0 10px color-mix(in srgb, var(--accent) 22%, transparent));
      animation: traceLine 1.15s ease both;
    }

    .minimal-chart .dot {
      fill: var(--surface);
      stroke: var(--accent);
      stroke-width: 2;
    }

    .minimal-chart .hover-dot {
      fill: transparent;
      stroke: transparent;
      cursor: crosshair;
      pointer-events: all;
    }

    .minimal-chart [data-chart-tip]:hover .dot,
    .minimal-chart [data-chart-tip]:focus .dot {
      fill: var(--accent);
      filter: drop-shadow(0 0 10px color-mix(in srgb, var(--accent) 42%, transparent));
    }

    .minimal-chart text {
      fill: var(--text);
      font-size: 11px;
    }

    [data-chart-tip] {
      cursor: help;
    }

    .chart-tooltip {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(-50%, -112%, 0) scale(0.98);
      min-width: 132px;
      max-width: 260px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      color: var(--text);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      transition: opacity 120ms ease, transform 120ms ease;
    }

    .chart-tooltip.visible {
      opacity: 1;
      transform: translate3d(-50%, -122%, 0) scale(1);
    }

    .chart-tooltip strong {
      display: block;
      font-size: 0.88rem;
      margin-bottom: 4px;
    }

    .chart-tooltip span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
    }

    @keyframes traceLine {
      from { stroke-dasharray: 360; stroke-dashoffset: 360; opacity: 0.35; }
      to { stroke-dasharray: 360; stroke-dashoffset: 0; opacity: 1; }
    }

    .cinema-split {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 28px;
      align-items: center;
    }

    .cinema-copy {
      padding: clamp(18px, 4vw, 54px);
    }

    .cinema-kicker {
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 18px;
    }

    .cinema-copy h2 {
      margin: 0 0 18px;
      font-size: clamp(1.85rem, 4.2vw, 3.35rem);
      line-height: 1.04;
      font-weight: 360;
      letter-spacing: 0;
    }

    .cinema-copy h2 strong {
      font-weight: 780;
    }

    .cinema-copy p {
      color: var(--muted);
      max-width: 620px;
      line-height: 1.7;
    }

    .matrix-kanban-stack {
      display: grid;
      gap: 12px;
    }

    .mini-board {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      background: color-mix(in srgb, var(--surface) 76%, transparent);
      box-shadow: var(--shadow);
    }

    .mini-board-title {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .eisenhower-focus-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .focus-task {
      min-height: 72px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: color-mix(in srgb, var(--surface) 72%, transparent);
      transition: transform 160ms ease, border-color 160ms ease;
    }

    .focus-task:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent) 38%, var(--line));
    }

    .focus-task.done {
      color: var(--muted);
      text-decoration: line-through;
    }

    .focus-label {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      margin-bottom: 8px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
      background: var(--accent);
    }

    .dot.red { background: #ff4141; }
    .dot.blue { background: #39bdf8; }
    .dot.gold { background: #e0a82e; }
    .dot.gray { background: #6e6e72; }
    .dot.green { background: #27d6a1; }

    .kanban-focus-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .habit-console {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.42fr);
      gap: 18px;
      align-items: start;
    }

    .habit-tracker {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: color-mix(in srgb, var(--surface) 78%, transparent);
      overflow: auto;
    }

    .habit-title {
      text-align: center;
      margin-bottom: 18px;
    }

    .habit-title h2 {
      margin: 0;
      font-weight: 400;
      font-size: clamp(1.35rem, 2.5vw, 2.15rem);
    }

    .habit-days-head,
    .habit-row {
      display: grid;
      grid-template-columns: minmax(145px, 0.8fr) repeat(31, 18px) 80px;
      gap: 5px;
      align-items: center;
      min-width: 850px;
    }

    .habit-days-head {
      color: var(--muted);
      font-size: 0.65rem;
      margin-bottom: 8px;
    }

    .habit-row {
      padding: 4px 0;
      border-bottom: 1px solid color-mix(in srgb, var(--line) 52%, transparent);
    }

    .habit-name {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      font-size: 0.86rem;
    }

    .habit-day {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid color-mix(in srgb, var(--muted) 36%, var(--line));
      background: transparent;
      padding: 0;
      transition: transform 120ms ease, background 120ms ease;
    }

    .habit-day:hover {
      transform: scale(1.18);
      border-color: var(--accent);
    }

    .habit-day.done {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 12px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .habit-bars {
      display: flex;
      align-items: end;
      justify-content: center;
      gap: 7px;
      min-height: 88px;
      margin: 10px 0 16px;
    }

    .habit-bars span {
      width: 9px;
      border-radius: 99px;
      height: var(--h);
      background: var(--accent);
      opacity: 0.92;
      animation: riseBar 600ms ease both;
    }

    @keyframes riseBar {
      from { transform: scaleY(0.15); opacity: 0.25; }
      to { transform: scaleY(1); opacity: 0.92; }
    }

    .habit-mini-bar {
      height: 10px;
      display: flex;
      gap: 2px;
      justify-content: flex-end;
    }

    .habit-mini-bar span {
      width: 3px;
      height: 100%;
      background: color-mix(in srgb, var(--accent) 72%, transparent);
      opacity: var(--o);
    }

    .planner-shell {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      min-height: 620px;
      background: color-mix(in srgb, var(--surface) 82%, transparent);
    }

    .planner-side {
      border-right: 1px solid var(--line);
      padding: 16px;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .planner-stage {
      overflow: auto;
    }

    .planner-days {
      display: grid;
      grid-template-columns: 64px repeat(7, minmax(140px, 1fr));
      min-width: 1040px;
    }

    .planner-head-cell,
    .planner-hour,
    .planner-cell {
      border-right: 1px solid color-mix(in srgb, var(--line) 72%, transparent);
      border-bottom: 1px solid color-mix(in srgb, var(--line) 58%, transparent);
      min-height: 54px;
      padding: 8px;
    }

    .planner-head-cell {
      min-height: 46px;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      position: sticky;
      top: 0;
      background: color-mix(in srgb, var(--surface) 96%, transparent);
      z-index: 2;
    }

    .planner-hour {
      color: var(--muted);
      font-size: 0.68rem;
    }

    .calendar-event {
      border: 1px solid color-mix(in srgb, var(--accent) 24%, var(--line));
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border-radius: 8px;
      padding: 8px;
      font-size: 0.76rem;
      color: var(--text);
      min-height: 34px;
      animation: cardIn 280ms ease both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .finance-hero {
      text-align: center;
      padding: 20px 0 34px;
    }

    .finance-hero h2 {
      margin: 8px auto 12px;
      max-width: 680px;
      font-size: clamp(1.8rem, 4vw, 3.15rem);
      line-height: 1.04;
      font-weight: 360;
    }

    .finance-hero strong {
      font-weight: 780;
    }

    .budget-list {
      display: grid;
      gap: 16px;
    }

    .budget-row {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr) 150px;
      gap: 12px;
      align-items: center;
    }

    .google-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #27d66f;
      font-size: 0.74rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    @media (max-width: 860px) {
    .module-head .app-tabs {
      display: grid;
    }

    body {
      --logo-max-height: 160px;
      --logo-opacity: 1;
      --logo-y: 0px;
      --logo-scale: 1;
      --header-pad-top: 18px;
      --header-pad-bottom: 10px;
      --header-gap: 8px;
      --header-bg-alpha: 0.86;
      --header-line-alpha: 0.075;
      --header-blur: 22px;
      background: #000;
    }

    .shell {
      display: block;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.08), transparent 28%),
        linear-gradient(180deg, #000 0%, #030303 48%, #000 100%);
    }

    .sidebar {
      position: relative;
      top: auto;
      z-index: 1;
      height: auto;
      min-height: 0;
      display: grid;
      place-items: center;
      gap: var(--header-gap);
      padding: var(--header-pad-top) 18px var(--header-pad-bottom);
      overflow: visible;
      border-right: 0;
      border-bottom: 1px solid rgba(255,255,255,var(--header-line-alpha));
      background: rgba(0,0,0,var(--header-bg-alpha));
      backdrop-filter: blur(var(--header-blur));
    }

    .brand {
      justify-content: center;
      padding: 0;
      border-bottom: 0;
      max-height: var(--logo-max-height);
      opacity: var(--logo-opacity);
      overflow: hidden;
      transform-origin: top center;
      transform: translateY(var(--logo-y)) scale(var(--logo-scale));
    }

    .brand-mark {
      width: min(190px, 48vw);
      height: auto;
      border-radius: 0;
    }

    .brand-mark img {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 0 22px rgba(255,255,255,0.14));
      animation: none;
    }

    .brand > div:last-child {
      display: none;
    }

    .nav {
      display: none;
    }

    .nav button {
      width: auto;
      min-height: 34px;
      flex: 0 0 auto;
      border: 1px solid rgba(255,255,255,0.09);

    function parseClientRoute() {
      const match = location.pathname.match(/^\/cliente\/([^/?#]+)/i);
      const querySlug = new URLSearchParams(location.search).get("cliente");
      const slug = decodeURIComponent(match?.[1] || querySlug || "").trim().toLowerCase();
      return { active: Boolean(slug), slug };
    }

    // O Supabase redireciona os links de convite/recuperação de senha com os
    // tokens de sessão no hash da URL (#access_token=...&type=invite), nunca
    // em ?query — funciona em qualquer path, inclusive /cliente/<slug>.
    function parseAuthHash() {
      if (!location.hash || location.hash.length < 2) return null;
      const params = new URLSearchParams(location.hash.slice(1));
      const accessToken = params.get("access_token");
      const type = params.get("type");
      if (!accessToken || (type !== "invite" && type !== "recovery")) return null;
      return {
        accessToken,
        refreshToken: params.get("refresh_token") || "",
        expiresIn: Number(params.get("expires_in") || 3600),
        type
      };
    }

    function clientAccessUrl(client) {
      const origin = location.protocol === "file:" ? "https://seu-dominio.com" : location.origin;
      return `${origin}/cliente/${encodeURIComponent(client.slug || slugify(client.businessName || client.business_name || client.name))}`;
    }

    function businessDaysLate(dateValue, referenceValue = today()) {
      if (!dateValue) return 0;
      const due = new Date(`${dateValue}T12:00:00`);
      const reference = new Date(`${referenceValue}T12:00:00`);
      if (Number.isNaN(due.getTime()) || Number.isNaN(reference.getTime()) || reference <= due) return 0;
      let count = 0;
      const cursor = new Date(due);
      cursor.setDate(cursor.getDate() + 1);
      while (cursor <= reference) {
        const day = cursor.getDay();
        if (day !== 0 && day !== 6) count += 1;
        cursor.setDate(cursor.getDate() + 1);
      }
      return count;
    }

    function clientAccessState(client) {
      const status = String(client.subscriptionStatus || client.subscription_status || "pendente").toLowerCase();
      const blocked = Boolean(client.loginBlocked ?? client.login_blocked);
      const dueDate = client.paymentDueDate || client.payment_due_date || "";
      const lateDays = businessDaysLate(dueDate);
      if (blocked) return { allowed: false, reason: "Login bloqueado pelo administrador.", lateDays };
      if (status === "pago") return { allowed: true, reason: "Assinatura paga.", lateDays };
      if (lateDays > 1) return { allowed: false, reason: "Mensalidade com atraso maior que 1 dia útil.", lateDays };
      return { allowed: true, reason: status === "atrasado" ? "Atraso dentro da tolerância." : "Mensalidade pendente dentro do prazo.", lateDays };
    }

    }

    function applyIcons(root = document) {
      const iconTargets = [
        ...(root.matches?.("[data-icon]") ? [root] : []),
        ...$$("[data-icon]", root)
      ];
      iconTargets.forEach(el => {
        if (!Object.prototype.hasOwnProperty.call(el.dataset, "iconLabel")) {
          el.dataset.iconLabel = el.innerHTML;
        }
        if (el.dataset.iconApplied === el.dataset.icon) return;
        el.innerHTML = `${icon(el.dataset.icon)}${el.dataset.iconLabel}`;
        el.dataset.iconApplied = el.dataset.icon;
      });
      const iconOnlyTargets = [
        ...(root.matches?.("[data-icon-only]") ? [root] : []),
        ...$$("[data-icon-only]", root)
      ];
      iconOnlyTargets.forEach(el => {
        if (el.dataset.iconApplied === el.dataset.iconOnly) return;
        el.innerHTML = icon(el.dataset.iconOnly);
        el.dataset.iconApplied = el.dataset.iconOnly;
      });
    }

    async function sha256(text) {
      const bytes = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest("SHA-256", bytes);
      return Array.from(new Uint8Array(digest)).map(byte => byte.toString(16).padStart(2, "0")).join("");
    }

    const cloudEnabled = () => Boolean(cloudConfig.url && cloudConfig.anonKey);

    async function loadCloudConfig() {
      const saved = parseJson(localStorage.getItem("nexor.cloud.config.v1")) || {};
      cloudConfig = {
        url: String(saved.url || "").replace(/\/$/, ""),
        anonKey: String(saved.anonKey || "")
      };
      if (location.protocol === "file:") return;
      try {
        const response = await fetch("/api/config", { cache: "no-store" });
        if (response.ok) {
          const config = await response.json();
          cloudConfig = {
            url: String(config.supabaseUrl || config.url || cloudConfig.url || "").replace(/\/$/, ""),
            anonKey: String(config.supabaseAnonKey || config.anonKey || cloudConfig.anonKey || "")
          };
        }
      } catch (error) {
        console.info("Config cloud não encontrada neste ambiente; usando modo local.", error);
      }
    }

    function parseJson(value) {
      try {
        return value ? JSON.parse(value) : null;
      } catch {
        return null;
      }
    }

    function readableError(error, fallback) {
      const raw = error?.message || String(error || "");
      const parsed = parseJson(raw);
      const message = parsed?.msg || parsed?.error_description || parsed?.error || raw || fallback;
      if (/invalid login credentials/i.test(message)) return "Senha atual incorreta.";
      return message;
    }

    function cloudHeaders(useAuth = true) {
      const headers = {
        apikey: cloudConfig.anonKey,
        "Content-Type": "application/json"
      };
      if (useAuth && cloudSession?.access_token) {
        headers.Authorization = `Bearer ${cloudSession.access_token}`;
      }
      return headers;
    }

    async function cloudFetch(path, options = {}, useAuth = true) {
      const response = await fetch(`${cloudConfig.url}${path}`, {
        ...options,
        headers: {
          ...cloudHeaders(useAuth),
          ...(options.headers || {})
        }
      });
      if (!response.ok) {
        const message = await response.text().catch(() => "");
        throw new Error(message || `Erro Supabase ${response.status}`);
      }
      if (response.status === 204) return null;
      return response.json().catch(() => null);
    }

    async function cloudLogin(email, password) {
      const session = normalizeCloudSession(await cloudFetch("/auth/v1/token?grant_type=password", {
        method: "POST",
        body: JSON.stringify({ email, password })
      }, false));
      cloudSession = session;
      localStorage.setItem(CLOUD_SESSION_KEY, JSON.stringify(session));
      return session;
    }

    function normalizeCloudSession(session) {
      if (!session) return session;
      if (!session.expires_at && session.expires_in) {
        session.expires_at = Math.floor(Date.now() / 1000) + Number(session.expires_in);
      }
      return session;
    }

    async function refreshCloudSession() {
      if (!cloudEnabled()) return null;
      const stored = parseJson(localStorage.getItem(CLOUD_SESSION_KEY));
      if (!stored?.access_token) return null;
      cloudSession = stored;
      const expiresAt = Number(stored.expires_at || 0);
      if (stored.refresh_token && expiresAt && expiresAt * 1000 < Date.now() + 60000) {
        cloudSession = normalizeCloudSession(await cloudFetch("/auth/v1/token?grant_type=refresh_token", {
          method: "POST",
          body: JSON.stringify({ refresh_token: stored.refresh_token })
        }, false));
        localStorage.setItem(CLOUD_SESSION_KEY, JSON.stringify(cloudSession));
      }
      return cloudSession;
    }

        throw new Error(parsed?.error || message || `Erro API ${response.status}`);

      return cloudFetch("/functions/v1/nexor-admin-user", {

    async function resolveClientLogin(identifier) {
      const value = String(identifier || "").trim().toLowerCase();
      if (!clientRoute.active) return value;
      if (cloudEnabled() && location.protocol !== "file:") {
        const response = await fetch("/api/resolve-client-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ slug: clientRoute.slug, identifier: value })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok || !result.email) {
          throw new Error(result.error || "Cliente ou usuário de acesso não encontrado.");
        }
        if (result.allowed === false) {
          throw new Error(result.reason || "Acesso bloqueado.");
        }
        return String(result.email || "").toLowerCase();
      }
      const client = platformClients.find(item => item.slug === clientRoute.slug && [item.accessUsername, item.email].map(text => String(text || "").toLowerCase()).includes(value));
      if (!client) throw new Error("Cliente ou usuário de acesso não encontrado.");
      const state = clientAccessState(client);
      if (!state.allowed) throw new Error(state.reason);
      return client.email.toLowerCase();
    }

    function bestUsersSnapshot(...lists) {
      const best = lists
        .filter(Array.isArray)
        .sort((a, b) => userSnapshotScore(b) - userSnapshotScore(a))[0] || [];
      const byEmail = new Map();
      best.forEach(user => byEmail.set(String(user.email || "").toLowerCase(), user));
      return Array.from(byEmail.values());
    }

    function userSnapshotScore(list) {
      const realUsers = list.filter(user => user?.email && user.email !== ADMIN_EMAIL).length;
      const hasAdmin = list.some(user => user?.email === ADMIN_EMAIL) ? 1 : 0;
      return realUsers * 10 + hasAdmin + list.length;
    }

    function openPersistentDb() {
      return new Promise((resolve, reject) => {
        if (!("indexedDB" in window)) {
          reject(new Error("IndexedDB indisponível."));
          return;
        }
        const request = indexedDB.open(PERSIST_DB_NAME, 1);
        request.onupgradeneeded = () => {
          const database = request.result;
          if (!database.objectStoreNames.contains(PERSIST_STORE)) {
            database.createObjectStore(PERSIST_STORE);
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error("Erro ao abrir IndexedDB."));
      });
    }

    async function readPersistentValue(key) {
      try {
        const database = await openPersistentDb();
        return await new Promise((resolve, reject) => {
          const tx = database.transaction(PERSIST_STORE, "readonly");
          const store = tx.objectStore(PERSIST_STORE);
          const request = store.get(key);
          request.onsuccess = () => resolve(request.result || "");
          request.onerror = () => reject(request.error || new Error("Erro ao ler backup."));
          tx.oncomplete = () => database.close();
          tx.onerror = () => database.close();
        });
      } catch (error) {
        console.warn("Backup persistente indisponível.", error);
        return "";
      }
    }

    async function writePersistentValue(key, value) {
      try {
        const database = await openPersistentDb();
        await new Promise((resolve, reject) => {
          const tx = database.transaction(PERSIST_STORE, "readwrite");
          const store = tx.objectStore(PERSIST_STORE);
          store.put(value, key);
          tx.oncomplete = () => {
            database.close();
            resolve();
          };
          tx.onerror = () => {
            database.close();
            reject(tx.error || new Error("Erro ao salvar backup."));
          };
        });
      } catch (error) {
        console.warn("Não foi possível gravar backup persistente.", error);
      }
    }

          cloudSession = null;
        }

    function imageFileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error("Não foi possível ler a foto."));
        reader.onload = () => {
          const image = new Image();
          image.onerror = () => reject(new Error("Arquivo de imagem inválido."));
          image.onload = () => {
            const maxSide = 900;
            const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
            const canvas = document.createElement("canvas");
            canvas.width = Math.max(1, Math.round(image.width * scale));
            canvas.height = Math.max(1, Math.round(image.height * scale));
            const context = canvas.getContext("2d");
            context.drawImage(image, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", 0.78));
          };
          image.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

        try {
          const email = await resolveClientLogin(identifier);
          await cloudLogin(email, password);
          const cloudUser = await cloudCurrentProfile();
          const clientState = cloudUser.clientAccount ? clientAccessState(cloudUser.clientAccount) : { allowed: true };
          if (cloudUser.status === "Inativo" || !clientState.allowed) {
            localStorage.removeItem(CLOUD_SESSION_KEY);
            cloudSession = null;
            $("#authError").textContent = clientState.reason || "Este login está inativo. Fale com o administrador.";
            return;
          }
          await startSession(cloudUser);
          return;
        } catch (error) {
          console.warn(error);
          $("#authError").textContent = error.message || "Usuário ou senha inválidos no Nexor Cloud.";
          return;
        }
      }
      const passwordHash = await sha256(password);
      const localEmail = await resolveLocalLogin(identifier).catch(error => {
        $("#authError").textContent = error.message;
        return "";
      });
      if (!localEmail) return;
      const user = users.find(item => item.email.toLowerCase() === localEmail && item.status !== "Inativo");
      if (!user || user.passwordHash !== passwordHash) {
        $("#authError").textContent = "Usuário ou senha inválidos.";
        return;
      }
      user.lastLogin = today();
      saveUsers();
      localStorage.setItem(SESSION_KEY, user.id);
      await startSession(user);
    }

    async function acceptInviteAndSetPassword(event) {
      event.preventDefault();
      const errorEl = $("#setPasswordError");
      errorEl.textContent = "";

      if (!pendingAuthHash?.accessToken) {
        errorEl.textContent = "Link de convite inválido ou expirado. Peça um novo convite.";
        return;
      }

      const formData = new FormData(event.currentTarget);
      const newPassword = String(formData.get("newPassword") || "");
      const confirmPassword = String(formData.get("confirmPassword") || "");
      if (newPassword.length < 6) {
        errorEl.textContent = "Use uma senha com pelo menos 6 caracteres.";
        return;
      }
      if (newPassword !== confirmPassword) {
        errorEl.textContent = "A nova senha e a confirmação devem ser iguais.";
        return;
      }

      try {
        // Mesmo mecanismo de changeOwnPassword(): PUT /auth/v1/user com o
        // access_token da sessão — aqui vem do hash do link de convite/
        // recuperação em vez de uma sessão já logada.
        const response = await fetch(`${cloudConfig.url}/auth/v1/user`, {
          method: "PUT",
          headers: {
            apikey: cloudConfig.anonKey,
            Authorization: `Bearer ${pendingAuthHash.accessToken}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ password: newPassword })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(result.msg || result.error_description || result.error || "Não foi possível definir a senha.");

        cloudSession = normalizeCloudSession({
          access_token: pendingAuthHash.accessToken,
          refresh_token: pendingAuthHash.refreshToken,
          expires_in: pendingAuthHash.expiresIn
        });
        localStorage.setItem(CLOUD_SESSION_KEY, JSON.stringify(cloudSession));
        pendingAuthHash = null;

        const cloudUser = await cloudCurrentProfile();
        const clientState = cloudUser.clientAccount ? clientAccessState(cloudUser.clientAccount) : { allowed: true };
        if (cloudUser.status === "Inativo" || !clientState.allowed) {
          localStorage.removeItem(CLOUD_SESSION_KEY);
          cloudSession = null;
          errorEl.textContent = clientState.reason || "Este login está inativo. Fale com o administrador.";
          return;
        }
        await startSession(cloudUser);
      } catch (error) {
        console.error(error);
        errorEl.textContent = readableError(error, "Não foi possível definir a senha.");
      }
    }

    async function resolveLocalLogin(identifier) {
      const value = String(identifier || "").trim().toLowerCase();
      if (!clientRoute.active) return value;
      const client = platformClients.find(item => item.slug === clientRoute.slug && [item.accessUsername, item.email].map(text => String(text || "").toLowerCase()).includes(value));
      if (!client) throw new Error("Cliente ou usuário de acesso não encontrado.");
      const state = clientAccessState(client);
      if (!state.allowed) throw new Error(state.reason);
      return client.email.toLowerCase();
    }

    function animateMetricValues(root = document) {
      $$(".metric strong", root).forEach(el => {
        const raw = el.textContent.trim();
        if (el.dataset.countSource === raw) return;
        el.dataset.countSource = raw;
        const isMoney = /^R\$\s?[\d.]+,\d{2}$/.test(raw);
        const isPlainNumber = /^-?\d+$/.test(raw);
        if (!isMoney && !isPlainNumber) return;
        const target = isMoney ? Number(raw.replace(/[^\d,-]/g, "").replace(",", ".")) : Number(raw);
        if (!Number.isFinite(target)) return;
        const start = target * 0.32;
        const startTime = performance.now();
        const duration = 550;
        const step = now => {
          const progress = Math.min(1, (now - startTime) / duration);
          const eased = 1 - Math.pow(1 - progress, 3);
          const current = start + (target - start) * eased;
          el.textContent = isMoney ? money(current) : Math.round(current).toLocaleString("pt-BR");
          if (progress < 1) requestAnimationFrame(step);
          else el.textContent = raw;
        };
        requestAnimationFrame(step);
      });
    }

      $("#projectScriptForm").addEventListener("submit", event => submitProjectScript(event, projectId));
      $$("[data-copy-script]", modalRoot).forEach(button => button.addEventListener("click", () => {
        const roteiro = project.roteiros.find(item => item.id === button.dataset.copyScript);
        if (!roteiro) return;
        navigator.clipboard?.writeText(roteiro.content).then(
          () => toast("Roteiro copiado.", "success"),
          () => toast("Não foi possível copiar.", "error")
        );
      }));

    async function submitProjectScript(event, projectId) {
      event.preventDefault();
      const formData = new FormData(event.currentTarget);
      const submitBtn = $("#projectScriptSubmit");
      const statusEl = $("#projectScriptStatus");
      submitBtn.disabled = true;
      statusEl.textContent = "Gerando roteiro...";
      try {
        const response = await fetch("/api/project-script", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${cloudSession?.access_token || ""}`
          },
          body: JSON.stringify({
            projectId,
            contentType: formData.get("contentType"),
            notes: formData.get("notes")
          })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(result.error || "Não foi possível gerar o roteiro.");
        await loadCloudDb();
        statusEl.textContent = "";
        submitBtn.disabled = false;
        openProjectScriptsModal(projectId);
        toast(`Roteiro gerado: ${result.roteiro.title}`, "success");
      } catch (error) {
        console.error(error);
        statusEl.textContent = error.message || "Não foi possível gerar o roteiro.";
        submitBtn.disabled = false;
      }
    }

    function cashFlowForecast(horizonDays = 30) {
      const days = Array.from({ length: horizonDays }, (_, i) => addDays(i));
      let running = 0;
      return days.map(day => {
        const dayItems = db.finance.filter(item => item.status === "Pendente" && item.date === day);
        running += sum(dayItems.filter(item => item.type === "Receita").map(item => item.value));
        running -= sum(dayItems.filter(item => item.type === "Despesa").map(item => item.value));
        return running;
      });
    }

    function cashFlowPanel() {
      const horizon = 30;
      const days = Array.from({ length: horizon }, (_, i) => addDays(i));
      const forecast = cashFlowForecast(horizon);
      const negativeIndex = forecast.findIndex(value => value < 0);
      const labels = days.map(day => dateText(day));
      const statusText = negativeIndex === -1
        ? "Saldo previsto permanece positivo nos próximos 30 dias."
        : `Saldo previsto fica negativo a partir de ${dateText(days[negativeIndex])}.`;
      return `
        <div class="panel" style="margin-bottom:14px">

            <span class="chip ${negativeIndex === -1 ? "success" : "danger"}">${negativeIndex === -1 ? "Sob controle" : "Atenção"}</span>

    function renderFinance() {

            <div class="meta"><span>Pago ${money(db.finance.filter(item => item.type === "Despesa" && item.status === "Pago").reduce((total, item) => total + Number(item.value || 0), 0))}</span><span>${pending.filter(item => item.type === "Despesa").length} pendente(s)</span></div>

              ${pending.slice(0, 3).map(item => `<div class="list-row"><strong>${escapeHtml(item.title)}</strong><span class="${item.type === "Despesa" ? "chip danger" : "chip success"}">${item.type === "Despesa" ? "-" : "+"}${money(item.value)}</span></div>`).join("") || emptyInline("Sem parcelas pendentes.")}

    function renderHabits() {

      return `
        ${moduleHead("Hábitos", "Ritmo diário programável, visual e silencioso.", '<button class="btn accent" type="button" data-open="habit" data-icon="plus">Novo hábito</button>')}
        <div class="habit-console">
          <section class="habit-tracker motion-card">
            <div class="habit-title">
              <div class="cinema-kicker">Hábitos</div>
              <h2>O silêncio da madrugada é onde nasce o foco.</h2>
              <p class="muted">Clique em qualquer quadrado para registrar ou remover um dia concluído.</p>
            </div>
            <div class="habit-bars">
              ${totals.map((value, index) => `<span data-chart-tip="${dateText(habitDays()[index].iso)}|${value} hábito${value === 1 ? "" : "s"} concluído${value === 1 ? "" : "s"}" style="--h:${18 + Math.min(70, value * 16 + (index % 5) * 4)}px"></span>`).join("")}

                ${days.map(day => `
                  <button class="habit-day ${isHabitDoneOn(habit, day.iso) ? "done" : ""}" type="button" title="${escapeHtml(habit.name)} - ${dateText(day.iso)}" data-habit-day="${habit.id}|${day.iso}"></button>
                `).join("")}
                <div class="habit-mini-bar" title="${habit.streak || 0} dias">
                  ${Array.from({ length: 18 }, (_, index) => `<span style="--o:${index < Math.min(18, habit.streak || 0) ? 1 : 0.18}"></span>`).join("")}

                  <div class="list-row">
                    <div>
                      <strong>${escapeHtml(habit.name)}</strong>
                      <div class="meta">${escapeHtml(habit.frequency)} • ${habit.days?.join(", ") || "Sem dias"}</div>

    function renderReports() {
      const completed = visibleTasks().filter(task => task.status === "Concluído").length;
      const late = visibleTasks().filter(task => task.dueDate && task.dueDate < today() && task.status !== "Concluído").length;
      const finishedProjects = db.projects.filter(project => project.status === "Finalizado").length;
      const revenue = monthFinance("Receita");
      const expense = monthFinance("Despesa");
      const max = Math.max(completed, late, finishedProjects, revenue, expense, 1);
      const clientRows = db.clients.map(client => ({
        label: client.name,
        value: db.tasks.filter(task => task.clientId === client.id).length + db.projects.filter(project => project.clientId === client.id).length
      })).sort((a, b) => b.value - a.value).slice(0, 5);
      return `
        ${moduleHead("Relatórios", "Produtividade, atrasos, projetos, lucro, clientes ativos e custos.", '<button class="btn" type="button" data-export="pdf" data-icon="file-text">PDF</button>')}
        <div class="grid two">
          <div class="panel">
            <div class="section-title"><h2>Evolução mensal</h2><span class="chip accent">${money(revenue - expense)}</span></div>
            <div class="bar-chart">
              ${barRow("Tarefas concluídas", completed, max, completed)}
              ${barRow("Tarefas atrasadas", late, max, late)}
              ${barRow("Projetos finalizados", finishedProjects, max, finishedProjects)}
              ${barRow("Receita mensal", revenue, max, money(revenue))}
              ${barRow("Despesas mensais", expense, max, money(expense))}
            </div>
          </div>
          <div class="panel">
            <div class="section-title"><h2>Clientes mais ativos</h2><span class="chip gold">${clientRows.length}</span></div>
            <div class="bar-chart">
              ${clientRows.map(row => barRow(row.label, row.value, Math.max(1, ...clientRows.map(item => item.value)), row.value)).join("") || emptyInline("Sem dados de clientes.")}
            </div>
          </div>
        </div>
        <div class="grid two" style="margin-top:14px">
          <div class="panel">
            <div class="section-title"><h2>Custos por projeto</h2></div>
            <div class="bar-chart">
              ${db.projects.map(project => {
                const cost = sum(db.finance.filter(item => item.projectId === project.id && item.type === "Despesa").map(item => item.value));
                const maxCost = Math.max(1, ...db.projects.map(item => sum(db.finance.filter(fin => fin.projectId === item.id && fin.type === "Despesa").map(fin => fin.value))));
                return barRow(project.name, cost, maxCost, money(cost));
              }).join("") || emptyInline("Sem custos vinculados.")}
            </div>
          </div>
          <div class="panel">
            <div class="section-title"><h2>Funcionários</h2></div>
            <div class="bar-chart">
              ${db.team.map(employee => barRow(employee.name, calculateSalary(employee), Math.max(1, ...db.team.map(calculateSalary)), money(calculateSalary(employee)))).join("") || emptyInline("Sem dados de equipe.")}
            </div>
          </div>
        </div>
      `;
    }

    function passwordCell(user) {

      }
      const hasSavedPassword = Boolean(user.plainPassword);
      return `
        <div class="row-actions">
          <span class="chip ${hasSavedPassword ? "accent" : ""}">${hasSavedPassword ? "Salva" : "Hash"}</span>

    function userAccessActions(user) {

      }

            ? `<button class="btn danger" type="button" data-deactivate-user="${user.id}" data-icon="x">Inativar</button>`
            : `<button class="btn accent" type="button" data-activate-user="${user.id}" data-icon="check">Ativar</button>`}

    function collaboratorSettings() {
      return `
        <div class="section-title"><h2>Acesso</h2><span class="chip">${escapeHtml(roles[currentUser.role])}</span></div>
        <div class="list">
          ${modules.filter(([id]) => canAccess(id)).map(([, label]) => `<div class="list-row"><strong>${label}</strong><span class="chip success">Disponível</span></div>`).join("")}
        </div>
      `;
    }

    function visibleTasks() {
      return db.tasks;
    }

    function plannerHour(task) {
      const value = String(task.time || "09:00");
      const hour = Number(value.slice(0, 2));
      const clamped = Math.max(6, Math.min(18, Number.isFinite(hour) ? hour : 9));
      return `${String(clamped).padStart(2, "0")}:00`;
    }

    function habitDays() {
      return Array.from({ length: 31 }, (_, index) => {
        const date = new Date();
        date.setDate(date.getDate() - (30 - index));
        const iso = date.toISOString().slice(0, 10);
        return { iso, day: String(date.getDate()).padStart(2, "0") };
      });
    }

    function isHabitDoneOn(habit, iso) {
      if (iso === today() && habit.doneToday) return true;
      return Boolean(habit.history?.some(item => item.date === iso && item.done));
    }

    function habitColor(id) {
      const colors = ["red", "blue", "gold", "green", "gray"];
      const score = String(id || "").split("").reduce((total, char) => total + char.charCodeAt(0), 0);
      return colors[score % colors.length];
    }

    function taskRow(task) {
      return `
        <div class="list-row">
          <div>
            <strong>${escapeHtml(task.title)}</strong>
            <div class="meta">${escapeHtml(getClientName(task.clientId))} • ${escapeHtml(getProjectName(task.projectId))} • ${dateText(task.dueDate)}</div>
          </div>
          ${priorityChip(task.priority)}
        </div>
      `;
    }

    function focusTask(task) {
      return `
        <article class="focus-task ${task.status === "Concluído" ? "done" : ""}" draggable="true" data-task-card="${task.id}">
          ${task.status === "Concluído" ? checkOnly() : `<button class="habit-day" type="button" title="Concluir" data-complete-task="${task.id}"></button>`}
          <span>${escapeHtml(task.title)}</span>
        </article>
      `;
    }

    function kanbanCard(task) {
      return `
        <article class="item-card draggable" draggable="true" data-task-card="${task.id}">
          <div class="card-head">
            <strong>${escapeHtml(task.title)}</strong>
            ${task.status === "Concluído" ? checkOnly() : priorityChip(task.priority)}
          </div>
          <div class="meta"><span>${escapeHtml(getClientName(task.clientId))}</span><span>${escapeHtml(getProjectName(task.projectId))}</span></div>
          <div class="meta"><span>${dateText(task.dueDate)}</span><span>${escapeHtml(getUserName(task.assignee))}</span></div>
          <div class="row-actions">
            <button class="btn icon" type="button" title="Editar" data-edit="task" data-id="${task.id}" data-icon="edit"></button>
            ${task.status !== "Concluído" ? `<button class="btn icon check-action" type="button" title="Concluir" data-complete-task="${task.id}">✓</button>` : ""}
          </div>
        </article>
      `;
    }

    function leadCard(lead) {
      return `
        <article class="item-card draggable" draggable="true" data-lead-card="${lead.id}">

    function donutChart(segments) {
      const clean = (segments || []).filter(item => Number(item.value) > 0);
      const total = sum(clean.map(item => item.value)) || 1;
      let cumulative = 0;
      const stops = clean.map((item, index) => {
        const start = (cumulative / total) * 360;
        cumulative += Number(item.value);
        const end = (cumulative / total) * 360;
        const opacity = Math.max(20, 92 - index * 16);
        return `color-mix(in srgb, var(--accent) ${opacity}%, transparent) ${start.toFixed(1)}deg ${end.toFixed(1)}deg`;
      }).join(", ");
      return `
        <div class="donut-wrap">
          <div class="donut-chart" style="background: conic-gradient(${stops || "var(--line) 0deg 360deg"})">
            <div class="donut-hole"><strong>${clean.length ? total : 0}</strong><span>total</span></div>
          </div>
          <div class="donut-legend">
            ${clean.map((item, index) => `
              <div class="donut-legend-row">
                <span class="donut-dot" style="opacity:${Math.max(0.2, 0.92 - index * 0.16)}"></span>
                <span>${escapeHtml(item.label)}</span>
                <strong>${item.value}</strong>
              </div>
            `).join("") || emptyInline("Sem dados ainda.")}
          </div>
        </div>
      `;
    }

    function minimalLineChart(values, label = "", labels = []) {
      const clean = values.length ? values.map(value => Number(value || 0)) : [0, 0, 0, 0, 0, 0, 0];
      const max = Math.max(1, ...clean);
      const min = Math.min(...clean);
      const spread = Math.max(1, max - min);
      const width = 320;
      const height = 150;
      const pad = 22;
      const points = clean.map((value, index) => {
        const x = pad + (index * ((width - pad * 2) / Math.max(1, clean.length - 1)));
        const y = height - pad - (((value - min) / spread) * (height - pad * 2));
        return [x, y, value];
      });
      const last = points[points.length - 1];
      return `
        <div class="minimal-chart" aria-label="Gráfico minimalista">
          <svg viewBox="0 0 ${width} ${height}" role="img">
            <line class="axis" x1="${pad}" y1="${height / 2}" x2="${width - pad}" y2="${height / 2}"></line>
            <polyline class="line" points="${points.map(point => `${point[0].toFixed(1)},${point[1].toFixed(1)}`).join(" ")}"></polyline>
            ${points.map((point, index) => `
              <g tabindex="0" data-chart-tip="${escapeHtml(labels[index] || `Ponto ${index + 1}`)}|${point[2]} ${escapeHtml(label)}">
                <circle class="dot" cx="${point[0].toFixed(1)}" cy="${point[1].toFixed(1)}" r="${index === points.length - 1 ? 5 : 3.5}"></circle>
                <circle class="hover-dot" cx="${point[0].toFixed(1)}" cy="${point[1].toFixed(1)}" r="16"></circle>
              </g>
            `).join("")}
            <text x="${Math.max(pad, last[0] - 6).toFixed(1)}" y="${Math.max(14, last[1] - 12).toFixed(1)}">${last[2]} ${escapeHtml(label)}</text>
          </svg>
        </div>
      `;
    }

    function sum(values) {

    function monthFinance(type) {
      const month = today().slice(0, 7);
      return sum(db.finance.filter(item => item.type === type && String(item.date || "").slice(0, 7) === month).map(item => item.value));

    function budgetRows() {
      const month = today().slice(0, 7);
      const grouped = db.finance
        .filter(item => item.type === "Despesa" && String(item.date || "").slice(0, 7) === month)
        .reduce((acc, item) => {
          const key = item.category || "Geral";
          acc[key] = (acc[key] || 0) + Number(item.value || 0);
          return acc;
        }, {});
      const rows = Object.entries(grouped).sort((a, b) => b[1] - a[1]).map(([category, spent]) => ({ category, spent }));
      const max = Math.max(1, ...rows.map(row => row.spent));
      return rows.map(row => ({ ...row, percent: Math.max(4, Math.round((row.spent / max) * 100)) }));
    }

    function avgProgress() {

    function calculateSalary(employee) {
      const salary = Number(employee.salary || 0);
      const advance = Number(employee.advance || 0);
      const absenceCount = Number(employee.absenceCount || 0);
      const daily = salary / 30;
      const shouldDiscountAbsence = employee.absenceReason === "Não justificada";
      return Math.max(0, salary - advance - (shouldDiscountAbsence ? daily * absenceCount : 0));
    }

    function attachChartTooltips() {

        element.dataset.tooltipBound = "true";
        element.setAttribute("tabindex", element.getAttribute("tabindex") || "0");

        element.addEventListener("mousemove", event => moveChartTooltip(event));
        element.addEventListener("mouseleave", hideChartTooltip);
        element.addEventListener("focus", event => showChartTooltip(event.currentTarget));
        element.addEventListener("blur", hideChartTooltip);
