    function chartTooltipEl() {
      let tooltip = $("#chartTooltip");
      if (!tooltip) {
        tooltip = document.createElement("div");
        tooltip.id = "chartTooltip";
        tooltip.className = "chart-tooltip";
        document.body.appendChild(tooltip);
      }
      return tooltip;
    }

    function showChartTooltip(element, event = null) {
      const tooltip = chartTooltipEl();
      const [title, value] = String(element.dataset.chartTip || "").split("|");
      tooltip.innerHTML = `<strong>${escapeHtml(title || "Dado")}</strong><span>${escapeHtml(value || "")}</span>`;
      tooltip.classList.add("visible");
      if (event) {
        moveChartTooltip(event);
      } else {
        const rect = element.getBoundingClientRect();
        positionChartTooltip(rect.left + rect.width / 2, rect.top);
      }
    }

    function moveChartTooltip(event) {
      positionChartTooltip(event.clientX, event.clientY);
    }

    function positionChartTooltip(x, y) {
      const tooltip = chartTooltipEl();
      const safeX = Math.max(86, Math.min(window.innerWidth - 86, x));
      const safeY = Math.max(58, Math.min(window.innerHeight - 18, y));
      tooltip.style.left = `${safeX}px`;
      tooltip.style.top = `${safeY}px`;
    }

    function hideChartTooltip() {
      chartTooltipEl().classList.remove("visible");
    }

    function attachDragAndDrop() {
      $$("[data-task-card]").forEach(card => {
        card.addEventListener("dragstart", event => {
          event.dataTransfer.setData("text/plain", card.dataset.taskCard);
          event.dataTransfer.setData("application/x-nexor-kind", "task");
          event.dataTransfer.effectAllowed = "move";
        });
      });
      $$("[data-lead-card]").forEach(card => {
        card.addEventListener("dragstart", event => {
          event.dataTransfer.setData("text/plain", card.dataset.leadCard);
          event.dataTransfer.setData("application/x-nexor-kind", "lead");
          event.dataTransfer.effectAllowed = "move";
        });
      });
      $$("[data-drop-kanban], [data-drop-day], [data-drop-quadrant], [data-drop-lead]").forEach(zone => {
        zone.addEventListener("dragover", event => {
          event.preventDefault();
          zone.classList.add("drag-over");
        });
        zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
        zone.addEventListener("drop", event => {
          event.preventDefault();
          zone.classList.remove("drag-over");
          const id = event.dataTransfer.getData("text/plain");
          const kind = event.dataTransfer.getData("application/x-nexor-kind") || "task";
          if (zone.dataset.dropLead || kind === "lead") {
            const lead = db.leads.find(item => item.id === id);
            if (!lead || !zone.dataset.dropLead) return;
            lead.stage = zone.dataset.dropLead;
            logActivity(`Lead movido: ${lead.name}`);
            saveDb();
            renderApp();
            return;
          }
          const task = db.tasks.find(item => item.id === id);
          if (!task) return;
          if (zone.dataset.dropKanban) {
            task.kanban = zone.dataset.dropKanban;
            task.status = kanbanToStatus(task.kanban);
          }
          if (zone.dataset.dropDay) task.weekday = zone.dataset.dropDay;
          if (zone.dataset.dropQuadrant) task.quadrant = zone.dataset.dropQuadrant;
          logActivity(`Tarefa movida: ${task.title}`);
          saveDb();
          renderApp();
        });
      });
    }

        index += chunk;
        el.textContent = text.slice(0, index);
        if (index < text.length) setTimeout(tick, speed);

      tick();

          <div class="nex-ai-conversation-list">${renderNexAiConversationList()}</div>
        `;
        $("#nexAiCloseBtn").addEventListener("click", closeNexAiDrawer);
        $("#nexAiNewBtn").addEventListener("click", () => {
          const conversation = createNexAiConversationObject();
          db.nexAiConversations.unshift(conversation);
          db.nexAiActiveId = conversation.id;
          saveDb();
          nexAiDrawerView = "chat";
          renderNexAiDrawer();
        });
        $$(".nex-ai-conversation-row", drawer).forEach(row => {
          row.addEventListener("click", event => {
            if (event.target.closest("[data-delete-conversation]")) return;
            db.nexAiActiveId = row.dataset.id;
            nexAiDrawerView = "chat";
            renderNexAiDrawer();
          });
        });
        $$("[data-delete-conversation]", drawer).forEach(button => {
          button.addEventListener("click", event => {
            event.stopPropagation();
            const id = button.dataset.deleteConversation;
            db.nexAiConversations = db.nexAiConversations.filter(item => item.id !== id);
            if (db.nexAiActiveId === id) db.nexAiActiveId = db.nexAiConversations[0]?.id || "";

        return;

    function renderNexAiConversationList() {
      if (!db.nexAiConversations.length) {

      return db.nexAiConversations

        .sort((a, b) => String(b.updatedAt).localeCompare(String(a.updatedAt)))
        .map(item => `

            <div>

    function renderNexAiThread(conversation) {
      if (!conversation.messages.length) {
        return `<div class="nex-ai-empty muted">Pergunte algo, peça um relatório ou descreva o que quer criar.</div>`;
      }
      return conversation.messages.map(item => `
        <div class="nex-ai-msg ${item.role}">
          <div class="nex-ai-bubble">${escapeHtml(item.content)}</div>
        </div>
      `).join("");
    }

    function scrollNexAiThreadToBottom() {
      const thread = $("#nexAiThread");
      if (thread) thread.scrollTop = thread.scrollHeight;
    }

    function pushNexAiMessage(role, content) {
      const conversation = activeNexAiConversation();
      conversation.messages.push({ role, content, at: new Date().toISOString() });
      conversation.messages = conversation.messages.slice(-60);
      conversation.updatedAt = new Date().toISOString();
      if (conversation.title === "Nova conversa" && role === "user") {
        conversation.title = content.slice(0, 48);
      }
      saveDb();
      const thread = $("#nexAiThread");
      if (!thread) return;
      thread.innerHTML = renderNexAiThread(conversation);
      scrollNexAiThreadToBottom();
      const headTitle = $(".nex-ai-head h2");
      if (headTitle) headTitle.textContent = conversation.title || "Nex AI";
      if (role === "assistant") {
        const bubbles = $$(".nex-ai-bubble", thread);
        const lastBubble = bubbles[bubbles.length - 1];
        if (lastBubble) typeText(lastBubble, content);
      }
    }

    function downloadPdfFromBase64(base64, filename) {
      const bytes = atob(base64);
      const buffer = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i++) buffer[i] = bytes.charCodeAt(i);
      const blob = new Blob([buffer], { type: "application/pdf" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename || "relatorio.pdf";
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
    }

    async function submitNexAiMessage(event) {
      event.preventDefault();
      const messageInput = $("#nexAiMessage");
      const message = messageInput.value.trim();
      if (!message) return;
      const submitBtn = $("#nexAiSubmit");
      submitBtn.disabled = true;
      messageInput.value = "";

      const conversation = activeNexAiConversation();
      // Mostra a mensagem do usuário e um "pensando..." só na tela, sem
      // persistir ainda — evita gravar duas vezes em sequência rápida e
      // colidir com a gravação que o servidor faz ao criar um registro.
      const history = conversation.messages.slice(-12).map(item => ({ role: item.role, content: item.content }));
      const thread = $("#nexAiThread");
      if (thread) {
        thread.innerHTML = renderNexAiThread(conversation) + `
          <div class="nex-ai-msg user"><div class="nex-ai-bubble">${escapeHtml(message)}</div></div>
          <div class="nex-ai-msg assistant"><div class="nex-ai-bubble">Pensando...</div></div>
        `;
        scrollNexAiThreadToBottom();
      }

      try {
        const response = await fetch("/api/nex-ai", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${cloudSession?.access_token || ""}`
          },
          body: JSON.stringify({ message, history })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(result.error || "Não foi possível processar a mensagem.");

        if (result.type === "task" || result.type === "habit" || result.type === "lead" || result.type === "finance") {
          await loadCloudDb();
        }
        pushNexAiMessage("user", message);
        pushNexAiMessage("assistant", result.summary || "Feito.");

        if (result.type === "report" && result.pdfBase64) {
          downloadPdfFromBase64(result.pdfBase64, result.filename);
        }
        if (result.type === "task" || result.type === "habit" || result.type === "lead" || result.type === "finance") {
          renderApp();
          openNexAiModal();
          toast(result.summary || "Registro criado com sucesso.", "success");
          return;
        }
        submitBtn.disabled = false;
        messageInput.focus();
      } catch (error) {
        console.error(error);
        pushNexAiMessage("user", message);
        pushNexAiMessage("assistant", error.message || "Não foi possível processar a mensagem.");
        submitBtn.disabled = false;
        messageInput.focus();
      }
    }

    function saveEntity(entity, id, formData) {
      const existing = findEntity(entity, id);
      const data = Object.fromEntries(formData.entries());
      const file = fileName(formData, "attachment");
      const certificate = fileName(formData, "certificate");
      const paymentProof = fileName(formData, "paymentProof");

      if (entity === "employee" && Number(data.absenceCount || 0) > 0 && data.absenceReason === "Doença" && !certificate && !existing?.certificateName) {
        toast("Para falta por doença, anexe o atestado médico.", "error");
        return;
      }

      const builders = {
        task: () => ({
          title: data.title,
          description: data.description,
          category: data.category,
          subcategory: data.subcategory,
          projectId: data.projectId,
          clientId: data.clientId,
          assignee: data.assignee,
          dueDate: data.dueDate,
          time: data.time || "09:00",
          priority: data.priority,
          status: data.status,
          kanban: data.kanban,
          quadrant: data.quadrant,
          weekday: data.weekday,
          tags: splitList(data.tags),
          checklist: splitLines(data.checklist).map((text, index) => ({ text, done: existing?.checklist?.[index]?.done || false })),
          comments: existing?.comments || [],
          createdAt: existing?.createdAt || today(),
          completedAt: data.status === "Concluído" ? (existing?.completedAt || today()) : "",
          attachmentName: file || existing?.attachmentName || ""
        }),
        project: () => ({ name: data.name, clientId: data.clientId, description: data.description, startDate: data.startDate, dueDate: data.dueDate, status: data.status, owner: data.owner, progress: clamp(data.progress, 0, 100), budget: Number(data.budget || 0), files: data.files, history: existing?.history || [], roteiros: existing?.roteiros || [] }),
        lead: () => ({ name: data.name, business: data.business, contact: data.contact, email: data.email, whatsapp: data.whatsapp, source: data.source, value: Number(data.value || 0), stage: data.stage || "Novo", owner: data.owner, nextAction: data.nextAction, nextDate: data.nextDate, notes: data.notes, createdAt: existing?.createdAt || today() }),
        client: () => ({ name: data.name, company: data.company, phone: data.phone, whatsapp: data.whatsapp, email: data.email, address: data.address, notes: data.notes }),
        finance: () => ({ title: data.title, type: data.type, category: data.category, value: Number(data.value || 0), date: data.date, clientId: data.clientId, projectId: data.projectId, status: data.status, notes: data.notes, attachmentName: file || existing?.attachmentName || "" }),
        production: () => ({ type: data.type, clientId: data.clientId, description: data.description, responsible: data.responsible, captureDate: data.captureDate, editDate: data.editDate, deliveryDate: data.deliveryDate, status: data.status, fileLink: data.fileLink, approval: data.approval, notes: data.notes, checklist: splitLines(data.checklist) }),
        habit: () => ({ name: data.name, frequency: data.frequency, days: splitList(data.days), target: Number(data.target || 0), streak: Number(data.streak || 0), bestStreak: Number(data.bestStreak || 0), doneToday: existing?.doneToday || false, history: existing?.history || [] }),
        employee: () => ({ name: data.name, roleName: data.roleName, salary: Number(data.salary || 0), absenceCount: Number(data.absenceCount || 0), absenceReason: data.absenceReason, certificateName: certificate || existing?.certificateName || "", advance: Number(data.advance || 0), paymentProof: paymentProof || existing?.paymentProof || "", notes: data.notes })
      };
      const record = { id: existing?.id || uid(entity), ...builders[entity]() };
      const collection = collectionFor(entity);
      const isNew = !existing;
      if (existing) {
        const index = collection.findIndex(item => item.id === id);
        collection[index] = record;
        logActivity(`${entityLabel(entity)} atualizado: ${record.title || record.name || record.type}`);
      } else {
        collection.unshift(record);
        logActivity(`${entityLabel(entity)} criado: ${record.title || record.name || record.type}`);
      }
      saveDb();
      closeModal();
      renderApp();

      // Ao criar um evento novo na aba Agenda (module "planner"), abre direto
      // a tela do Google Calendar já preenchida — só falta a pessoa clicar em
      // Salvar do lado do Google (nenhuma permissão/OAuth é necessária pra
      // esse link funcionar).
      if (entity === "task" && isNew && activeModule === "planner" && record.dueDate) {
        window.open(googleCalendarAddUrl(record), "_blank", "noopener,noreferrer");
      }
    }

    function collectionFor(entity) {
      return {
        task: db.tasks,
        project: db.projects,
        lead: db.leads,
        client: db.clients,
        finance: db.finance,
        production: db.productions,
        habit: db.habits,
        employee: db.team
      }[entity];
    }

    function splitList(value) {
      return String(value || "").split(",").map(item => item.trim()).filter(Boolean);
    }

    function splitLines(value) {
      return String(value || "").split("\\n").map(item => item.trim()).filter(Boolean);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, Number(value || 0)));
    }

    function deleteEntity(entity, id) {
      if (!canManage() && entity !== "habit") return;
      if (!confirm("Excluir este registro?")) return;
      const collection = collectionFor(entity);
      const item = collection.find(record => record.id === id);
      const index = collection.findIndex(record => record.id === id);
      if (index >= 0) collection.splice(index, 1);

    function toggleHabit(id) {
      const habit = db.habits.find(item => item.id === id);
      if (!habit) return;
      setHabitDate(habit, today(), !isHabitDoneOn(habit, today()));
      logActivity(`${habit.doneToday ? "Hábito concluído" : "Hábito reaberto"}: ${habit.name}`);
      saveDb();
      renderApp();
    }

    function toggleHabitDay(value) {
      const [id, iso] = String(value || "").split("|");
      const habit = db.habits.find(item => item.id === id);
      if (!habit || !iso) return;
      setHabitDate(habit, iso, !isHabitDoneOn(habit, iso));
      logActivity(`Hábito atualizado: ${habit.name}`);
      saveDb();
      renderApp();
    }

    function setHabitDate(habit, iso, done) {
      habit.history ||= [];
      habit.history = habit.history.filter(item => item.date !== iso);
      habit.history.unshift({ date: iso, done });
      if (iso === today()) habit.doneToday = done;
      habit.streak = calculateHabitStreak(habit);
      habit.bestStreak = Math.max(Number(habit.bestStreak || 0), Number(habit.streak || 0));
    }

    function calculateHabitStreak(habit) {
      let streak = 0;
      for (let offset = 0; offset < 365; offset++) {
        const date = new Date();
        date.setDate(date.getDate() - offset);
        const iso = date.toISOString().slice(0, 10);
        if (isHabitDoneOn(habit, iso)) streak++;
        else break;
      }
      return streak;
    }

    async function changeOwnPassword(event) {
      event.preventDefault();
      const formData = new FormData(event.currentTarget);
      const currentPassword = String(formData.get("currentPassword") || "");
      const newPassword = String(formData.get("newPassword") || "");
      const confirmPassword = String(formData.get("confirmPassword") || "");
      if (newPassword.length < 6) {
        accessNotice = "Use uma senha com pelo menos 6 caracteres.";
        renderApp();
        return;
      }
      if (newPassword !== confirmPassword) {
        accessNotice = "A nova senha e a confirmacao devem ser iguais.";
        renderApp();
        return;
      }

      try {
        if (cloudEnabled() && cloudSession?.access_token) {
          const verifiedSession = normalizeCloudSession(await cloudFetch("/auth/v1/token?grant_type=password", {
            method: "POST",
            body: JSON.stringify({ email: currentUser.email, password: currentPassword })
          }, false));
          const response = await fetch(`${cloudConfig.url}/auth/v1/user`, {
            method: "PUT",
            headers: {
              apikey: cloudConfig.anonKey,
              Authorization: `Bearer ${verifiedSession.access_token}`,
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ password: newPassword })
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(result.msg || result.error_description || result.error || "Não foi possível alterar a senha.");
          cloudSession = verifiedSession;
          localStorage.setItem(CLOUD_SESSION_KEY, JSON.stringify(cloudSession));
        } else {
          const localUser = users.find(user => user.id === currentUser.id);
          if (!localUser) throw new Error("Usuário não encontrado.");
          const currentHash = await sha256(currentPassword);
          if (localUser.passwordHash !== currentHash) throw new Error("Senha atual incorreta.");
          localUser.passwordHash = await sha256(newPassword);
          localUser.plainPassword = newPassword;
          localUser.passwordUpdatedAt = today();
          saveUsers();
        }
        let notificationWarning = "";
        try {
          await notifyPasswordChanged();
        } catch (notifyError) {
          console.warn(notifyError);
          notificationWarning = " Sua senha foi alterada, mas nao foi possivel notificar o administrador.";
        }
        event.currentTarget.reset();
        accessNotice = `Sua senha foi alterada.${notificationWarning}`;
        renderApp();
      } catch (error) {
        accessNotice = readableError(error, "Nao foi possivel alterar sua senha.");
        renderApp();
        return;
        toast(error.message || "Não foi possível alterar sua senha.", "error");
      }
    }

    async function notifyPasswordChanged() {
      const label = `Senha alterada: ${currentUser.name || currentUser.email}`;
      if (cloudEnabled() && cloudSession?.access_token && location.protocol !== "file:") {
        const response = await fetch("/api/user-event", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${cloudSession.access_token}`
          },
          body: JSON.stringify({ action: "password_changed" })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(result.error || "Senha alterada, mas nao foi possivel notificar o administrador.");
        return;
      }

      const adminUser = users.find(user => user.role === "admin" || user.email === ADMIN_EMAIL);
      if (!adminUser) return;
      const item = {
        id: uid("act"),
        label,
        date: new Date().toISOString(),
        kind: "password_changed",
        userId: currentUser.id,
        userEmail: currentUser.email
      };
      if (adminUser.id === currentUser.id) {
        db.activity.unshift(item);
        db.activity = db.activity.slice(0, 60);
        saveDb();
        return;
      }
      const key = dbKey(adminUser.id);
      const adminDb = parseJson(localStorage.getItem(key)) || createDefaultDb(true);
      adminDb.activity ||= [];
      adminDb.activity.unshift(item);
      adminDb.activity = adminDb.activity.slice(0, 60);
      const payload = JSON.stringify(adminDb);
      localStorage.setItem(key, payload);
      writePersistentValue(key, payload);
    }

    async function saveLocalClientAccount(payload, id = "") {
      const duplicate = platformClients.find(client => client.id !== id && [client.email, client.accessUsername, client.slug].some(value => [payload.email, payload.accessUsername, payload.slug].includes(value)));
      if (duplicate) {

      let authUserId = payload.authUserId;
      if (!id) {
        authUserId = uid("user");
        users.push({
          id: authUserId,
          name: payload.responsibleName,
          email: payload.email,
          passwordHash: await sha256(payload.password),
          plainPassword: payload.password,
          gender: "neutral",
          role: "cliente",
          status: "Ativo",
          createdAt: today(),
          lastLogin: ""
        });
        localStorage.setItem(dbKey(authUserId), JSON.stringify(createDefaultDb(false)));
      } else {
        users = users.map(user => user.id === authUserId ? {
          ...user,
          name: payload.responsibleName,
          email: payload.email,
          ...(payload.password ? { passwordHash: null, plainPassword: payload.password } : {})
        } : user);
        if (payload.password) {
          const target = users.find(user => user.id === authUserId);
          if (target) target.passwordHash = await sha256(payload.password);
        }
      }
      const record = {
        ...payload,
        id: id || uid("client_account"),
        authUserId,
        plainPassword: payload.password || payload.plainPassword,
        createdAt: payload.createdAt || today()
      };
      platformClients = id ? platformClients.map(client => client.id === id ? record : client) : [record, ...platformClients];
      saveUsers();
      savePlatformClients();
      accessNotice = `${id ? "Usuário atualizado" : "Usuário criado"}: ${record.businessName}`;
    }

        passwordHash: await sha256(plainPassword),

        gender: String(formData.get("gender") || "neutral"),
        role: String(formData.get("role")),
        status: "Ativo",
        createdAt: today(),
        lastLogin: ""
      };

        users = users.filter(item => item.id !== user.id);
        return;
      }
      try {
        const userDbPayload = JSON.stringify(createDefaultDb(false));
        localStorage.setItem(dbKey(user.id), userDbPayload);

    }

      const hits = [
        ...visibleTasks().map(item => ({ module: "tasks", icon: "check-square", title: item.title, meta: getClientName(item.clientId) })),
        ...db.projects.map(item => ({ module: "projects", icon: "folder-kanban", title: item.name, meta: getClientName(item.clientId) })),
        ...db.leads.map(item => ({ module: "leads", icon: "target", title: item.name || item.business, meta: `${item.stage || "Novo"} ${item.email || ""}` })),
        ...db.clients.map(item => ({ module: "clients", icon: "users", title: item.name, meta: item.company })),
        ...db.finance.map(item => ({ module: "finance", icon: "wallet", title: item.title, meta: money(item.value) })),
        ...db.productions.map(item => ({ module: "production", icon: "clapperboard", title: item.type, meta: getClientName(item.clientId) }))
      ].filter(item => `${item.title} ${item.meta}`.toLowerCase().includes(term)).slice(0, 8);
      root.innerHTML = hits.map(item => `
        <button class="search-hit" type="button" data-search-module="${item.module}">
          ${icon(item.icon)}
          <span><strong>${escapeHtml(item.title)}</strong><span class="meta">${escapeHtml(item.meta || "")}</span></span>
          <span class="chip">${modules.find(([id]) => id === item.module)?.[1] || ""}</span>
        </button>
      `).join("") || `<div class="empty">Nada encontrado</div>`;
      root.classList.remove("hidden");
      $$("[data-search-module]", root).forEach(button => button.addEventListener("click", () => {
        activeModule = button.dataset.searchModule;
        root.classList.add("hidden");
        renderApp();
      }));
    }

    function handleExport(type) {
      if (type === "pdf") {
        window.print();
        return;
      }
      if (type === "ics") {
        download(`nexor-agenda-${today()}.ics`, buildIcs(), "text/calendar;charset=utf-8");
        return;
      }
      if (type === "backup") {
        download(`nexor-backup-${currentUser.email}-${today()}.json`, JSON.stringify({ user: currentUser.email, db }, null, 2), "application/json");
        return;
      }
      const rows = [["Nome", "Tipo", "Categoria", "Valor", "Data", "Cliente", "Projeto", "Status"]];
      db.finance.forEach(item => rows.push([item.title, item.type, item.category, item.value, item.date, getClientName(item.clientId), getProjectName(item.projectId), item.status]));
      const csv = rows.map(row => row.map(cell => `"${String(cell ?? "").replace(/"/g, '""')}"`).join(";")).join("\\n");
      download(`nexor-financeiro-${today()}.csv`, csv, "text/csv;charset=utf-8");
    }

    function buildIcs() {
      const stamp = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
      const events = visibleTasks().filter(task => task.dueDate).map(task => {
        const start = `${task.dueDate.replace(/-/g, "")}T${String(task.time || "09:00").replace(":", "")}00`;
        const endHour = String(Math.min(23, Number(String(task.time || "09:00").slice(0, 2)) + 1)).padStart(2, "0");
        const end = `${task.dueDate.replace(/-/g, "")}T${endHour}${String(task.time || "09:00").slice(3, 5)}00`;
        return [
          "BEGIN:VEVENT",
          `UID:${task.id}@nexor.local`,
          `DTSTAMP:${stamp}`,
          `DTSTART:${start}`,
          `DTEND:${end}`,
          `SUMMARY:${icsEscape(task.title)}`,
          `DESCRIPTION:${icsEscape([task.description, getClientName(task.clientId), getProjectName(task.projectId)].filter(Boolean).join(" | "))}`,
          "END:VEVENT"
        ].join("\r\n");
      }).join("\r\n");
      return ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Nexor//Agenda//PT-BR", events, "END:VCALENDAR"].join("\r\n");
    }

    function icsEscape(value) {
      return String(value || "").replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n");
    }

    function connectGoogleCalendar() {
      db.calendar ||= { googleClientId: "", connected: false, lastSync: "" };
      if (!db.calendar.googleClientId) {
        toast("Para conexão OAuth real, informe o Google OAuth Client ID em Configurações. Enquanto isso, use a exportação .ics ou o botão Abrir Google.");
        activeModule = "settings";
        renderApp();
        return;
      }
      db.calendar.connected = true;
      db.calendar.lastSync = new Date().toISOString();
      logActivity("Google Calendar preparado para conexão");
      saveDb();
      toast("Client ID salvo. Em uma publicação web com origem autorizada no Google Cloud, esta tela já fica pronta para iniciar o fluxo OAuth.");
      renderApp();
    }

    function googleCalendarAddUrl(task) {
      const start = `${String(task.dueDate || today()).replace(/-/g, "")}T${String(task.time || "09:00").replace(":", "")}00`;
      const end = `${String(task.dueDate || today()).replace(/-/g, "")}T${String(Math.min(23, Number(String(task.time || "09:00").slice(0, 2)) + 1)).padStart(2, "0")}${String(task.time || "09:00").slice(3, 5)}00`;
      const url = new URL("https://calendar.google.com/calendar/render");
      url.searchParams.set("action", "TEMPLATE");
      url.searchParams.set("text", task.title || "Evento Nexor");
      url.searchParams.set("dates", `${start}/${end}`);
      url.searchParams.set("details", task.description || "Criado no Nexor");
      return url.toString();
    }

    function openGoogleCalendar() {
      const nextTask = visibleTasks().find(task => task.dueDate) || {};
      window.open(googleCalendarAddUrl(nextTask), "_blank", "noopener,noreferrer");
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    function updateNotificationDot() {
      if (!db) return;
      const hasUnread = alerts().length > 0 || db.activity.some(item => !db.notificationsReadAt || new Date(item.date) > new Date(db.notificationsReadAt));
      $("#notifyDot").classList.toggle("hidden", !hasUnread);
    }

    boot().catch(error => {
      console.error(error);
      toast("Não foi possível iniciar o Nexor com os dados salvos. Recarregue a página e tente novamente.", "error");
    });
  </script>
</body>
