<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="badgeBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="45%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9fbff"/>
      <stop offset="55%" stop-color="#5eecff"/>
      <stop offset="100%" stop-color="#22c9e8"/>
    </linearGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="6" y="6" width="188" height="188" rx="34" fill="url(#badgeBg)" stroke="#000" stroke-width="1"/>
  <rect x="9" y="9" width="182" height="182" rx="31" fill="none" stroke="#4a4a4a" stroke-width="1.4" opacity="0.55"/>

  <g filter="url(#softGlow)">
    <path d="M62 66 L62 134 M62 66 L138 134 M138 66 L138 134"
          fill="none" stroke="url(#glow)" stroke-width="13"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#softGlow)">
    <text x="100" y="168" text-anchor="middle" font-family="Inter, Arial, sans-serif"
          font-size="27" font-weight="700" fill="url(#glow)" letter-spacing="1">Nex AI</text>
  </g>
</svg>
